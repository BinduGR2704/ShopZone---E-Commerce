<!DOCTYPE html>
<html>
<head>
  <title>User Profile</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body onload="loadProfilePage()">

  <div class="profile-container">

    <h2>User Profile</h2>

    <div id="profileView"></div>

    <div id="editSection" style="display:none; margin-top:20px;">
      <h3>Edit Details</h3>

      <input type="text" id="edit_phone" placeholder="Phone Number">
      <textarea id="edit_address" placeholder="Address"></textarea>

      <button onclick="updateProfile()">Save Changes</button>
      <button onclick="cancelEdit()">Cancel</button>
    </div>

    <button id="editBtn" onclick="enableEdit()">Edit Profile</button>

  </div>

  <script src="js/auth.js"></script>
</body>
</html>
