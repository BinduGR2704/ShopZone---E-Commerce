<!DOCTYPE html>
<html>

<head>
  <title>Shop Zone</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <div class="overlay">

    <!-- NAVBAR -->
    <div class="navbar">

      <div class="logo">
        Shop Zone
      </div>

      <div class="nav-links">

        <a href="register.html">Register</a>
        <a href="login.html">Login</a>
        <a href="shop.html">Shop Items</a>

        <!-- PROFILE DROPDOWN -->
        <div class="profile-menu">

          <button onclick="toggleProfileMenu()" class="profile-btn">
            My Profile ▼
          </button>

          <div id="profileDropdown" class="dropdown">

            <a href="profile.html">
              Profile
            </a>

            <a href="order_history.html">
              Order History
            </a>

            <a href="#" onclick="logout(); return false;">
              Logout
            </a>

          </div>

        </div>

      </div>

    </div>

    <!-- HERO SECTION -->
    <div class="hero">
      <h1>Welcome To Shop Zone</h1>
      <p>Your One Stop Online Shopping Platform</p>
    </div>

  </div>

  <script src="js/auth.js"></script>

</body>

</html>
